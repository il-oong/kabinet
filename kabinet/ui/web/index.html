<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kabinet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══ Tab bar ══════════════════════════════════════════════════════════ -->
<div class="tab-bar">
  <button class="active" onclick="kabinet.switchTab('assembly', this)">어셈블리</button>
  <button onclick="kabinet.switchTab('modules', this)">모듈 구성</button>
  <button onclick="kabinet.switchTab('drawings', this)">도면 출력</button>
  <button onclick="kabinet.switchTab('presets', this)">프리셋</button>
</div>

<!-- ══ Assembly tab ══════════════════════════════════════════════════════ -->
<div id="tab-assembly" class="tab-panel active">

  <div class="section">
    <div class="section-title">기본 정보</div>
    <div class="field-row">
      <label>이름</label>
      <input type="text" id="f-name" value="내 가구" oninput="kabinet.onField('name', this.value)">
    </div>
    <div class="field-row">
      <label>폭 (Width)</label>
      <input type="number" id="f-width" value="900" min="100" max="3000"
             oninput="kabinet.onField('width', +this.value)">
      <span class="unit">mm</span>
    </div>
    <div class="field-row">
      <label>최대 깊이</label>
      <input type="number" id="f-depth" value="580" min="100" max="1200"
             oninput="kabinet.onField('max_depth', +this.value)">
      <span class="unit">mm</span>
    </div>
    <div class="field-row">
      <label>받침 높이</label>
      <input type="number" id="f-base" value="0" min="0" max="300"
             oninput="kabinet.onField('base_height', +this.value)">
      <span class="unit">mm</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">상판 (Top Panel)</div>
    <div class="toggle-row">
      <label>상판 사용</label>
      <input type="checkbox" id="f-top-use" checked onchange="kabinet.onTopPanelToggle(this.checked)">
    </div>
    <div id="top-panel-fields">
      <div class="field-row">
        <label>두께</label>
        <input type="number" id="f-top-t" value="20" min="9" max="50"
               oninput="kabinet.onTopPanelField('thickness', +this.value)">
        <span class="unit">mm</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">EP 측면 마감</div>
    <div class="toggle-row">
      <label>좌측 EP</label>
      <input type="checkbox" id="f-ep-left" checked onchange="kabinet.onEP('left', this.checked)">
    </div>
    <div class="toggle-row">
      <label>우측 EP</label>
      <input type="checkbox" id="f-ep-right" checked onchange="kabinet.onEP('right', this.checked)">
    </div>
    <div class="field-row">
      <label>EP 두께</label>
      <input type="number" id="f-ep-t" value="18" min="3" max="30"
             oninput="kabinet.onEP('thickness', +this.value)">
      <span class="unit">mm</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-secondary" onclick="kabinet.loadSelection()">선택 불러오기</button>
    <button class="btn-primary" id="btn-generate" onclick="kabinet.generate()">생성</button>
    <button class="btn-secondary" onclick="kabinet.regenerate()">재생성</button>
  </div>
</div>

<!-- ══ Modules tab ═══════════════════════════════════════════════════════ -->
<div id="tab-modules" class="tab-panel">
  <div id="module-list" class="module-list"></div>

  <button class="btn-add" onclick="kabinet.addModule('shelf_module')">＋ 선반/수납 모듈</button>
  <button class="btn-add" style="margin-top:4px" onclick="kabinet.addModule('drawer_module')">＋ 서랍 모듈</button>

  <div class="btn-row">
    <button class="btn-primary" onclick="kabinet.generate()">생성</button>
    <button class="btn-secondary" onclick="kabinet.regenerate()">재생성</button>
  </div>
</div>

<!-- ══ Drawings tab ══════════════════════════════════════════════════════ -->
<div id="tab-drawings" class="tab-panel">
  <div class="section">
    <div class="section-title">출력할 뷰</div>
    <div class="view-grid">
      <label class="view-check"><input type="checkbox" value="front" checked> 정면도</label>
      <label class="view-check"><input type="checkbox" value="right" checked> 우측면도</label>
      <label class="view-check"><input type="checkbox" value="left"> 좌측면도</label>
      <label class="view-check"><input type="checkbox" value="top" checked> 평면도</label>
      <label class="view-check"><input type="checkbox" value="section" checked> 단면도</label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">선택된 어셈블리</div>
    <div class="field-row">
      <label>EntityID</label>
      <input type="text" id="f-export-id" placeholder="선택 후 불러오기" readonly>
    </div>
    <button class="btn-secondary" style="width:100%;margin-top:4px"
            onclick="kabinet.loadSelectionForExport()">현재 선택 읽기</button>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="kabinet.exportDrawings()">도면 출력 (PNG + PDF)</button>
  </div>
</div>

<!-- ══ Presets tab ═══════════════════════════════════════════════════════ -->
<div id="tab-presets" class="tab-panel">
  <div class="section">
    <div class="section-title">저장</div>
    <div class="field-row">
      <label>프리셋 이름</label>
      <input type="text" id="f-preset-name" placeholder="예) 안방 붙박이장">
    </div>
    <button class="btn-secondary" style="width:100%;margin-top:4px"
            onclick="kabinet.savePreset()">현재 설정 저장</button>
  </div>

  <div class="section">
    <div class="section-title">불러오기</div>
    <div id="preset-list" class="preset-list">
      <span style="color:var(--text-dim);font-size:12px">저장된 프리셋이 없습니다.</span>
    </div>
    <button class="btn-secondary" style="width:100%;margin-top:8px"
            onclick="kabinet.listPresets()">새로고침</button>
  </div>
</div>

<!-- ══ Status bar ════════════════════════════════════════════════════════ -->
<div id="status-bar" class="status-bar">준비됨</div>

<script src="app.js"></script>
<script src="modules.js"></script>
</body>
</html>
