<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kabinet</title>
  <link rel="stylesheet" href="styles.css?v=1.7.0">
</head>
<body>

<!-- ══ 상단: 프리셋 한 줄 ═══════════════════════════════════════════════ -->
<div class="topbar">
  <select id="f-furniture-type" onchange="kabinet.onPresetChange(this.value)" title="가구 유형/프리셋 선택">
    <option value="">프리셋 선택…</option>
    <optgroup label="── 수납장/옷장">
      <option value="wardrobe">붙박이장 / 옷장</option>
      <option value="wardrobe_sliding">슬라이딩 붙박이장</option>
      <option value="shoe_cabinet">신발장</option>
      <option value="bookshelf">책장</option>
      <option value="tv_unit">TV장</option>
      <option value="display_800">수납장 800</option>
      <option value="display_1200">수납장 1200</option>
      <option value="drawer_tower">서랍장 타워</option>
      <option value="shelf_grid">격자형 수납장</option>
      <option value="open_shelf">오픈 선반장</option>
      <option value="corner_unit">코너 수납장</option>
    </optgroup>
    <optgroup label="── 주방/거실">
      <option value="kitchen_base">주방 하부장</option>
      <option value="kitchen_upper">주방 상부장</option>
      <option value="kitchen_run">주방 런 (수평 배열)</option>
      <option value="living_run">거실 수납 런</option>
      <option value="vanity">화장대</option>
    </optgroup>
    <optgroup label="── 침대장">
      <option value="bed_surround">침대장 (베드 서라운드)</option>
      <option value="bed_surround_with_bridge">침대장 + 브릿지 상부장</option>
    </optgroup>
    <optgroup label="── 책상">
      <option value="desk_basic">기본 책상</option>
      <option value="desk_with_pedestal">책상 + 지지 서랍장</option>
      <option value="desk_l_shape">L자 책상 (런 모드)</option>
      <option value="desk_with_side_cabinet">책상 + 사이드장</option>
    </optgroup>
    <optgroup label="── 자녀방">
      <option value="kids_wardrobe">자녀방 붙박이장</option>
      <option value="kids_upper_open">오픈 상부장</option>
      <option value="kids_upper_door">도어 상부장</option>
      <option value="kids_desk_upper">자녀방 책상+상부장</option>
      <option value="kids_bed_single">자녀방 싱글 침대장</option>
    </optgroup>
    <optgroup label="── 내 프리셋" id="user-preset-group"></optgroup>
  </select>
  <span class="version-badge">v1.7.0</span>
</div>

<!-- ══ 본문 (단일 스크롤) ══════════════════════════════════════════════ -->
<div class="scroll-area">

  <!-- 실시간 정면도 미리보기 -->
  <div class="preview-wrap">
    <canvas id="preview-canvas" width="452" height="240"></canvas>
    <div class="preview-meta">
      <span id="preview-size">—</span>
      <span class="preview-hint">정면도 미리보기</span>
    </div>
  </div>

  <div class="info-box" id="preset-info" style="display:none"></div>

  <!-- 기본 정보 -->
  <div class="card">
    <div class="card-title">기본 정보</div>
    <div class="field-row">
      <label>이름</label>
      <input type="text" id="f-name" value="내 가구"
             oninput="kabinet.onField('name', this.value)">
    </div>
    <div class="grid-2">
      <div class="field-row">
        <label id="width-label">전체 폭</label>
        <input type="number" id="f-width" value="900" min="100" max="6000"
               oninput="kabinet.onField('width', +this.value)">
        <span class="unit">mm</span>
      </div>
      <div class="field-row">
        <label>깊이</label>
        <input type="number" id="f-depth" value="580" min="100" max="1200"
               oninput="kabinet.onField('max_depth', +this.value)">
        <span class="unit">mm</span>
      </div>
      <div class="field-row" id="distribute-row">
        <label>총 높이</label>
        <input type="number" id="f-target-height" value="2100" min="200" max="3000"
               oninput="kabinet.onTargetHeightLive(+this.value)">
        <span class="unit">mm</span>
      </div>
      <div class="field-row">
        <label>받침 높이</label>
        <input type="number" id="f-base" value="0" min="0" max="300"
               oninput="kabinet.onField('base_height', +this.value)">
        <span class="unit">mm</span>
      </div>
    </div>
    <div class="field-hint" id="width-hint">폭·총높이를 바꾸면 모듈 치수가 비율대로 자동 조정됩니다</div>
    <div class="field-row">
      <label>소재</label>
      <select id="f-material" onchange="kabinet.onField('material', this.value)">
        <option value="LPM">LPM (저압 멜라민)</option>
        <option value="PET">PET (친환경 도어)</option>
        <option value="UV_gloss">UV 도장</option>
        <option value="acrylic">아크릴</option>
        <option value="high_gloss">하이그로시</option>
        <option value="phenix">페닉스</option>
        <option value="HPL">HPL (고압 멜라민)</option>
        <option value="MDF_paint">MDF 도장</option>
        <option value="plywood">합판</option>
        <option value="solid_wood">집성목/원목</option>
      </select>
      <button class="btn-inline" title="모듈 높이 균등 분배" onclick="kabinet.distributeHeight()">높이 균등</button>
    </div>
    <!-- 계산 표시 (숨김 요소 — 로직 호환용) -->
    <div class="calc-row">
      <span>현재 총 높이 <b id="total-height-display">—</b>mm</span>
      <span id="total-width-row" style="display:none">섹션 폭 합 <b id="total-run-width-display">—</b>mm</span>
    </div>
    <div style="display:none" id="height-hint"></div>
    <div style="display:none" id="distribute-hint"></div>
  </div>

  <!-- 모듈 구성 -->
  <div class="card">
    <div class="card-title">모듈 구성</div>
    <div class="height-summary" id="module-height-summary"></div>
    <div id="module-list" class="module-list"></div>
    <div class="add-module-row">
      <button class="btn-add" onclick="kabinet.addModule('shelf_module')">＋ 선반/수납</button>
      <button class="btn-add" onclick="kabinet.addModule('drawer_module')">＋ 서랍</button>
      <button class="btn-add" onclick="kabinet.addModule('desk_module')">＋ 책상</button>
      <button class="btn-add" onclick="kabinet.addModule('bed_gap')" title="런 모드에서 폭만 차지">🛏 침대공간</button>
      <button class="btn-add" onclick="kabinet.addModule('v_gap')" title="적층 모드에서 높이만 차지 (책상 위 이격 등)">⬜ 개방공간</button>
    </div>
  </div>

  <!-- 구조 옵션 -->
  <details class="card" open>
    <summary>구조 옵션 — 상판 · EP · 걸레받이 · 런 모드</summary>
    <div class="toggle-row">
      <label>상판 사용</label>
      <input type="checkbox" id="f-top-use" checked
             onchange="kabinet.onTopPanelToggle(this.checked)">
    </div>
    <div id="top-panel-fields">
      <div class="field-row">
        <label>상판 두께</label>
        <input type="number" id="f-top-t" value="20" min="9" max="50"
               oninput="kabinet.onTopPanelField('thickness', +this.value)">
        <span class="unit">mm</span>
      </div>
    </div>
    <div class="toggle-row">
      <label>좌측 EP</label>
      <input type="checkbox" id="f-ep-left" checked onchange="kabinet.onEP('left', this.checked)">
      <label style="margin-left:14px">우측 EP</label>
      <input type="checkbox" id="f-ep-right" checked onchange="kabinet.onEP('right', this.checked)">
      <label style="margin-left:14px">상부 EP</label>
      <input type="checkbox" id="f-ep-top" onchange="kabinet.onEP('top', this.checked)">
    </div>
    <div class="field-row">
      <label>EP 두께</label>
      <input type="number" id="f-ep-t" value="18" min="3" max="30"
             oninput="kabinet.onEP('thickness', +this.value)">
      <span class="unit">mm</span>
    </div>
    <div class="toggle-row">
      <label>EP 윗면만 보이게 <span class="dim-note">(상판이 EP 위에 얹힘)</span></label>
      <input type="checkbox" id="f-ep-top-flush" onchange="kabinet.onEpTopFlush(this.checked)">
    </div>
    <div class="field-row">
      <label>받침 구조</label>
      <select id="f-base-type" onchange="kabinet.onField('base_type', this.value)">
        <option value="wood">목재 받침 + 걸레받이 (기본)</option>
        <option value="steel">철제 각파이프 프레임</option>
      </select>
    </div>
    <div class="toggle-row">
      <label>걸레받이 (토킥)</label>
      <input type="checkbox" id="f-kickboard" checked
             onchange="kabinet.onField('has_kickboard', this.checked)">
    </div>
    <div class="toggle-row">
      <label>수평 런 모드 <span class="dim-note">(주방/시스템장 — 가로 배열)</span></label>
      <input type="checkbox" id="f-run-mode" onchange="kabinet.onRunMode(this.checked)">
    </div>
    <div id="run-height-row" class="field-row" style="display:none">
      <label>런 공통 높이</label>
      <input type="number" id="f-run-height" value="740" min="100" max="3000"
             oninput="kabinet.onField('run_height', +this.value)">
      <span class="unit">mm</span>
    </div>
  </details>

  <!-- 내 프리셋 -->
  <details class="card">
    <summary>내 프리셋 저장/관리</summary>
    <div class="field-row">
      <label>이름</label>
      <input type="text" id="f-preset-name" placeholder="예) 안방 붙박이장">
      <button class="btn-inline" onclick="kabinet.savePreset()">저장</button>
    </div>
    <div id="preset-list" class="preset-list">
      <span class="dim-note">저장된 프리셋이 없습니다.</span>
    </div>
  </details>

  <!-- 선택 DXF 출력 옵션 -->
  <details class="card">
    <summary>선택 DXF 옵션 — 뷰 · 치수 · 은선</summary>
    <div class="view-grid">
      <label class="view-check"><input type="checkbox" id="g-view-front" checked> 정면도</label>
      <label class="view-check"><input type="checkbox" id="g-view-side" checked> 측면도</label>
      <label class="view-check"><input type="checkbox" id="g-view-top" checked> 평면도</label>
    </div>
    <div class="toggle-row">
      <label>전체 치수 (W/H/D)</label>
      <input type="checkbox" id="g-dim-overall" checked>
    </div>
    <div class="toggle-row">
      <label>유닛(장) 분할 치수 <span class="dim-note">(소단위 안쪽 / 전체 바깥)</span></label>
      <input type="checkbox" id="g-dim-units" checked>
    </div>
    <div class="toggle-row">
      <label>등폭 구간 EQ 표기 <span class="dim-note">(같은 폭 연속 → EQ)</span></label>
      <input type="checkbox" id="g-eq" checked>
    </div>
    <div class="field-row">
      <label>치수 반올림</label>
      <select id="g-round">
        <option value="1" selected>1mm (정수)</option>
        <option value="0.1">0.1mm (정밀)</option>
        <option value="5">5mm</option>
        <option value="10">10mm</option>
      </select>
    </div>
    <div class="toggle-row">
      <label>은선 제거 <span class="dim-note">(가려진 선 숨김 — 권장)</span></label>
      <input type="checkbox" id="g-hlr" checked>
    </div>
    <div class="toggle-row">
      <label>복잡 메시 박스로 표시 <span class="dim-note">(엣지 300개 초과 유닛 — 소파/매트리스 등)</span></label>
      <input type="checkbox" id="g-mesh-box" checked>
    </div>
    <div class="toggle-row">
      <label>곡면 메시 엣지 포함 <span class="dim-note">(soft/smooth — 기본 제외)</span></label>
      <input type="checkbox" id="g-include-soft">
    </div>
  </details>

  <!-- SketchUp 씬 도면 (보조) -->
  <details class="card">
    <summary>SketchUp 씬 도면 (PNG + PDF) — 보조 출력</summary>
    <div class="dim-note" style="margin-bottom:8px">
      모델 뷰포트를 캡처한 이미지 도면입니다. 공장 발주용 CAD 도면은
      하단의 <b>발주도면 DXF</b>를 사용하세요.
    </div>
    <div class="view-grid">
      <label class="view-check"><input type="checkbox" value="front" checked> 정면도</label>
      <label class="view-check"><input type="checkbox" value="right" checked> 우측면도</label>
      <label class="view-check"><input type="checkbox" value="left"> 좌측면도</label>
      <label class="view-check"><input type="checkbox" value="top" checked> 평면도</label>
      <label class="view-check"><input type="checkbox" value="section" checked> 단면도</label>
    </div>
    <input type="hidden" id="f-export-id">
    <button class="btn-secondary" style="width:100%;margin-top:8px"
            onclick="kabinet.exportDrawings()">씬 도면 출력 (선택된 어셈블리)</button>
  </details>

</div>

<!-- ══ 하단 고정 액션바 ═════════════════════════════════════════════════ -->
<div class="action-bar">
  <div id="status-bar" class="status-bar">준비됨</div>
  <div class="action-buttons">
    <button class="btn-secondary btn-sm" title="SketchUp에서 선택한 Kabinet 가구를 폼으로 불러오기"
            onclick="kabinet.loadSelection()">선택 불러오기</button>
    <button class="btn-primary" id="btn-apply" title="생성 또는 재생성 (자동 판단)"
            onclick="kabinet.smartApply()">모델 반영</button>
    <button class="btn-accent" title="정면/측면/평면 3면도 + 표제란 DXF (CAD용)"
            onclick="kabinet.exportDXF()">발주도면 DXF</button>
    <button class="btn-secondary" title="SketchUp에서 선택한 그룹/컴포넌트를 3면도 DXF로 출력 (직접 모델링한 가구용)"
            onclick="kabinet.exportGroupDXF()">선택 DXF</button>
    <button class="btn-secondary" title="부재/하드웨어/경고 CSV"
            onclick="kabinet.exportCutList()">커트리스트</button>
  </div>
</div>

<script src="app.js?v=1.7.0"></script>
<script src="modules.js?v=1.7.0"></script>
</body>
</html>
