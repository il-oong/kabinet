<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kabinet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══ Tab bar ══════════════════════════════════════════════════════════ -->
<div class="tab-bar">
  <button class="active" onclick="kabinet.switchTab('assembly', this)">어셈블리</button>
  <button onclick="kabinet.switchTab('modules', this)">모듈 구성</button>
  <button onclick="kabinet.switchTab('drawings', this)">도면 출력</button>
  <button onclick="kabinet.switchTab('presets', this)">프리셋</button>
</div>

<!-- ══ Assembly tab ══════════════════════════════════════════════════════ -->
<div id="tab-assembly" class="tab-panel active">

  <!-- 가구 유형 빠른 선택 -->
  <div class="section">
    <div class="section-title">가구 유형 빠른 선택</div>
    <div class="field-row">
      <label>유형</label>
      <select id="f-furniture-type" onchange="kabinet.loadFurniturePreset(this.value)">
        <option value="">-- 유형 선택 --</option>
        <option value="wardrobe">붙박이장 / 옷장</option>
        <option value="kitchen_base">주방 하부장</option>
        <option value="kitchen_upper">주방 상부장</option>
        <option value="vanity">화장대</option>
        <option value="shoe_cabinet">신발장</option>
        <option value="bookshelf">책장</option>
        <option value="tv_unit">TV장</option>
        <option value="display_800">수납장 800</option>
        <option value="display_1200">수납장 1200</option>
        <option value="drawer_tower">서랍장 타워</option>
        <option value="wardrobe_sliding">슬라이딩 붙박이장</option>
        <option value="kitchen_run">주방 런 (수평 배열)</option>
      </select>
    </div>
    <div class="info-box" id="preset-info" style="display:none"></div>
  </div>

  <div class="section">
    <div class="section-title">기본 정보</div>
    <div class="field-row">
      <label>이름</label>
      <input type="text" id="f-name" value="내 가구"
             oninput="kabinet.onField('name', this.value)">
    </div>
    <div class="field-row">
      <label>폭 (Width)</label>
      <input type="number" id="f-width" value="900" min="100" max="3000"
             oninput="kabinet.onField('width', +this.value)">
      <span class="unit">mm</span>
      <button class="btn-inline" title="전체 모듈에 폭 적용"
              onclick="kabinet.syncWidthToModules()">모두 적용</button>
    </div>
    <div class="field-row">
      <label>최대 깊이</label>
      <input type="number" id="f-depth" value="580" min="100" max="1200"
             oninput="kabinet.onField('max_depth', +this.value)">
      <span class="unit">mm</span>
    </div>
    <div class="field-row">
      <label>받침 높이</label>
      <input type="number" id="f-base" value="0" min="0" max="300"
             oninput="kabinet.onField('base_height', +this.value)">
      <span class="unit">mm</span>
    </div>
    <!-- 수평 런 모드 -->
    <div class="toggle-row">
      <label>수평 런 모드</label>
      <input type="checkbox" id="f-run-mode"
             onchange="kabinet.onRunMode(this.checked)"
             title="주방 런·시스템장처럼 모듈을 가로로 배열">
      <span style="font-size:11px;color:var(--text-dim);margin-left:6px">주방/시스템장</span>
    </div>
    <div id="run-height-row" class="field-row" style="display:none">
      <label>런 공통 높이</label>
      <input type="number" id="f-run-height" value="740" min="100" max="3000"
             oninput="kabinet.onField('run_height', +this.value)">
      <span class="unit">mm</span>
    </div>
    <div class="field-row">
      <label>소재</label>
      <select id="f-material" onchange="kabinet.onField('material', this.value)">
        <option value="LPM">LPM (저압 멜라민)</option>
        <option value="PET">PET (친환경 도어)</option>
        <option value="UV_gloss">UV 도장</option>
        <option value="acrylic">아크릴</option>
        <option value="high_gloss">하이그로시</option>
        <option value="phenix">페닉스</option>
        <option value="HPL">HPL (고압 멜라민)</option>
        <option value="MDF_paint">MDF 도장</option>
        <option value="plywood">합판</option>
        <option value="solid_wood">집성목/원목</option>
      </select>
    </div>
  </div>

  <!-- 총 높이 관리 -->
  <div class="section" id="height-mgmt-section">
    <div class="section-title">총 높이 관리</div>
    <div class="field-row">
      <label>현재 총 높이</label>
      <span id="total-height-display" class="value-display">—</span>
      <span class="unit">mm</span>
    </div>
    <div class="field-row" id="distribute-row">
      <label>목표 총 높이</label>
      <input type="number" id="f-target-height" value="2100" min="200" max="3000">
      <span class="unit">mm</span>
      <button class="btn-inline" onclick="kabinet.distributeHeight()">균등 분배</button>
    </div>
    <div class="field-row" id="total-width-row" style="display:none">
      <label>섹션 총 폭</label>
      <span id="total-run-width-display" class="value-display">—</span>
      <span class="unit">mm (모듈 폭 합계)</span>
    </div>
    <div class="field-row" style="font-size:11px;color:var(--text-dim);padding-left:110px" id="distribute-hint">
      모듈 높이를 목표 총 높이에 맞게 균등하게 나눕니다
    </div>
  </div>

  <div class="section">
    <div class="section-title">상판 (Top Panel)</div>
    <div class="toggle-row">
      <label>상판 사용</label>
      <input type="checkbox" id="f-top-use" checked
             onchange="kabinet.onTopPanelToggle(this.checked)">
    </div>
    <div id="top-panel-fields">
      <div class="field-row">
        <label>두께</label>
        <input type="number" id="f-top-t" value="20" min="9" max="50"
               oninput="kabinet.onTopPanelField('thickness', +this.value)">
        <span class="unit">mm</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">EP 측면 마감</div>
    <div class="toggle-row">
      <label>좌측 EP</label>
      <input type="checkbox" id="f-ep-left" checked
             onchange="kabinet.onEP('left', this.checked)">
    </div>
    <div class="toggle-row">
      <label>우측 EP</label>
      <input type="checkbox" id="f-ep-right" checked
             onchange="kabinet.onEP('right', this.checked)">
    </div>
    <div class="field-row">
      <label>EP 두께</label>
      <input type="number" id="f-ep-t" value="18" min="3" max="30"
             oninput="kabinet.onEP('thickness', +this.value)">
      <span class="unit">mm</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-secondary" onclick="kabinet.loadSelection()">선택 불러오기</button>
    <button class="btn-primary" id="btn-generate" onclick="kabinet.generate()">생성</button>
    <button class="btn-secondary" onclick="kabinet.regenerate()">재생성</button>
  </div>
</div>

<!-- ══ Modules tab ═══════════════════════════════════════════════════════ -->
<div id="tab-modules" class="tab-panel">

  <!-- 높이 요약 -->
  <div class="height-summary" id="module-height-summary"></div>

  <div id="module-list" class="module-list"></div>

  <div class="add-module-row">
    <button class="btn-add" onclick="kabinet.addModule('shelf_module')">
      ＋ 선반/수납 모듈
    </button>
    <button class="btn-add" onclick="kabinet.addModule('drawer_module')">
      ＋ 서랍 모듈
    </button>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="kabinet.generate()">생성</button>
    <button class="btn-secondary" onclick="kabinet.regenerate()">재생성</button>
  </div>
</div>

<!-- ══ Drawings tab ══════════════════════════════════════════════════════ -->
<div id="tab-drawings" class="tab-panel">
  <div class="section">
    <div class="section-title">출력할 뷰</div>
    <div class="view-grid">
      <label class="view-check"><input type="checkbox" value="front" checked> 정면도</label>
      <label class="view-check"><input type="checkbox" value="right" checked> 우측면도</label>
      <label class="view-check"><input type="checkbox" value="left"> 좌측면도</label>
      <label class="view-check"><input type="checkbox" value="top" checked> 평면도</label>
      <label class="view-check"><input type="checkbox" value="section" checked> 단면도</label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">선택된 어셈블리</div>
    <div class="field-row">
      <label>EntityID</label>
      <input type="text" id="f-export-id" placeholder="선택 후 불러오기" readonly>
    </div>
    <button class="btn-secondary" style="width:100%;margin-top:4px"
            onclick="kabinet.loadSelectionForExport()">현재 선택 읽기</button>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="kabinet.exportDrawings()">도면 출력 (PNG + PDF)</button>
  </div>

  <div class="section" style="margin-top:14px">
    <div class="section-title">커트리스트 (부재 목록)</div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px">
      현재 폼의 스펙 기준으로 부재 목록을 CSV로 저장합니다.<br>
      부재명 / 가로 / 세로 / 두께 / 수량 / 소재 / 결방향 포함
    </div>
    <button class="btn-secondary" style="width:100%"
            onclick="kabinet.exportCutList()">커트리스트 CSV 저장</button>
  </div>
</div>

<!-- ══ Presets tab ═══════════════════════════════════════════════════════ -->
<div id="tab-presets" class="tab-panel">
  <div class="section">
    <div class="section-title">저장</div>
    <div class="field-row">
      <label>프리셋 이름</label>
      <input type="text" id="f-preset-name" placeholder="예) 안방 붙박이장">
    </div>
    <button class="btn-secondary" style="width:100%;margin-top:4px"
            onclick="kabinet.savePreset()">현재 설정 저장</button>
  </div>

  <div class="section">
    <div class="section-title">불러오기</div>
    <div id="preset-list" class="preset-list">
      <span style="color:var(--text-dim);font-size:12px">저장된 프리셋이 없습니다.</span>
    </div>
    <button class="btn-secondary" style="width:100%;margin-top:8px"
            onclick="kabinet.listPresets()">새로고침</button>
  </div>

  <!-- 가구 유형 기본 프리셋 -->
  <div class="section">
    <div class="section-title">기본 프리셋 (가구 유형)</div>
    <div class="built-in-presets">
      <button onclick="kabinet.loadFurniturePreset('wardrobe')">붙박이장</button>
      <button onclick="kabinet.loadFurniturePreset('wardrobe_sliding')">슬라이딩 붙박이장</button>
      <button onclick="kabinet.loadFurniturePreset('kitchen_base')">주방 하부장</button>
      <button onclick="kabinet.loadFurniturePreset('kitchen_upper')">주방 상부장</button>
      <button onclick="kabinet.loadFurniturePreset('kitchen_run')">주방 런 (수평)</button>
      <button onclick="kabinet.loadFurniturePreset('vanity')">화장대</button>
      <button onclick="kabinet.loadFurniturePreset('shoe_cabinet')">신발장</button>
      <button onclick="kabinet.loadFurniturePreset('bookshelf')">책장</button>
      <button onclick="kabinet.loadFurniturePreset('tv_unit')">TV장</button>
      <button onclick="kabinet.loadFurniturePreset('display_800')">수납장 800</button>
      <button onclick="kabinet.loadFurniturePreset('display_1200')">수납장 1200</button>
      <button onclick="kabinet.loadFurniturePreset('drawer_tower')">서랍장 타워</button>
    </div>
  </div>
</div>

<!-- ══ Status bar ════════════════════════════════════════════════════════ -->
<div id="status-bar" class="status-bar">준비됨</div>

<script src="app.js"></script>
<script src="modules.js"></script>
</body>
</html>
